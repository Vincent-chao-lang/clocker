name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify Flutter installation
        run: flutter doctor -v

      - name: Run tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  release:
    name: Create Release
    needs: [build-android, analyze]
    # 只在main分支的push事件中创建Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: ./apk

      - name: Generate version tag
        id: version
        run: |
          # 生成版本号: v1.0.0-build-YYYYMMDD-HHMMSS
          VERSION_TAG="v1.0.0-build-$(date +'%Y%m%d-%H%M%S')"
          echo "tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "version_name=Clocker v1.0.0 Build $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version_name }}
          body: |
            ## Clocker - 极简闹钟应用

            一款专为老年人设计的极简闹钟应用,最多2步即可完成闹钟设置。

            ### 功能特点
            - **6个预设时间卡片**: 常用时间一键设置(6:00、7:00、8:00、12:00、18:00、21:00)
            - **自定义时间选择**: 支持选择任意时间
            - **极简交互**: 点击卡片 → 确认,2步完成设置
            - **老年人友好**: 大字体、高对比度、大按钮

            ### 下载
            - **Android APK**: 从下方 Assets 下载 `app-release.apk`

            ### 安装说明
            1. 下载APK文件
            2. 在Android设备上安装
            3. 授予通知权限
            4. 开始使用!

            ---
            构建信息: ${{ github.sha }}
            构建时间: $(date +'%Y-%m-%d %H:%M:%S')
          files: ./apk/app-release.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

